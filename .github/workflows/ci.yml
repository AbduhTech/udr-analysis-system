name: UDR System CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run formula unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run console pipeline (demo mode)
        run: |
          python main.py
          echo "Console pipeline completed successfully"

      - name: Verify output files were generated
        run: |
          test -f outputs/fig1_ai_frequency.png
          test -f outputs/fig2_udr_profile.png
          test -f outputs/fig3_debugging_gap.png
          test -f outputs/fig4_illusory_competence.png
          test -f outputs/fig5_institutional_gap.png
          test -f outputs/results_report.txt
          echo "All 6 output files confirmed present"
